name: Bug Report
description: Create a report to help us improve
labels: ["bug", "pending"]
body:
  - type: markdown
    attributes:
      value: |
        Please fill out the sections below to help everyone identify and fix the bug.
  - type: textarea
    id: description
    attributes:
      label: Describe your issue
      placeholder: When I click here this happens
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to page X
        2. Click here
        3. Click there
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What was the expected result?
      placeholder: I expected this to happen
  - type: textarea
    id: screenshots
    attributes:
      label: Put here any screenshots or videos (optional)
  - type: dropdown
    id: app_version
    attributes:
      label: Application version and build
      description: Pick the release shown in Settings > About.
      options:
        # release-options:start
        - "26.7-beta.2 (20260718190227) — beta"
        - "26.6.1 (20260703123053) — latest"
        - "26.6 (20260702140005) — release"
        - "26.5.1 (20260613051735) — release"
        # release-options:end
        - Other / not listed
    validations:
      required: true
  - type: input
    id: other_app_version
    attributes:
      label: Other application version and build (optional)
      description: Complete this only when you selected "Other / not listed".
      placeholder: 26.7 (20260712155351)
  - type: input
    id: os_version
    attributes:
      label: Operating system (name + version)
      description: e.g. macOS 26.5.1 — include platform and version.
      placeholder: macOS 26.5.1
    validations:
      required: true
  - type: markdown
    attributes:
      value: |
        Thanks for reporting this issue! We will get back to you as soon as possible.
